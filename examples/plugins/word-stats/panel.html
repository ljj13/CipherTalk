<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>会话分析</title>
  <style>
    /* 控件观感由宿主注入的统一组件库（.ct-*）提供，这里只写布局 */
    body { padding: 20px; }
    .actions { display: flex; flex-direction: column; gap: 10px; margin-top: 16px; }
    #log { margin-top: 12px; max-height: 40vh; overflow: auto; }
    #log:empty { display: none; }
    .cloud { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px; }
  </style>
</head>
<body>
  <h3 class="ct-title">会话分析</h3>
  <div class="ct-hint" id="session-name">读取上下文…</div>
  <div class="actions">
    <button id="btn-transcribe" class="ct-btn ct-btn-block">批量转写本会话语音</button>
    <button id="btn-freq" class="ct-btn ct-btn-block">统计高频词（含转写文本）</button>
    <button id="btn-export" class="ct-btn ct-btn-primary ct-btn-block">导出本会话（HTML）</button>
  </div>
  <div class="cloud" id="cloud"></div>
  <div id="log" class="ct-code ct-scroll"></div>
  <script type="module" src="./panel.js"></script>
</body>
</html>
