<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>词频统计</title>
  <style>
    /* 控件观感由宿主注入的统一组件库（.ct-*）提供，这里只写布局 */
    body { padding: 24px; }
    #session-select { max-width: 420px; margin: 16px 0; }
    #status { margin-bottom: 12px; }
    .cloud { display: flex; flex-wrap: wrap; gap: 8px; }
    .cloud .ct-chip { cursor: pointer; }
    .cloud .ct-chip:hover { border-color: var(--accent); color: var(--accent); }
    .cloud .count { opacity: 0.55; font-size: 11px; }
  </style>
</head>
<body>
  <h2 class="ct-title">词频统计</h2>
  <p class="ct-hint">选择一个会话，统计最近消息里的高频词。点击词语复制。</p>
  <select id="session-select" class="ct-select">
    <option value="">加载会话中…</option>
  </select>
  <div id="status" class="ct-hint"></div>
  <div id="cloud" class="cloud"></div>
  <script type="module" src="./main.js"></script>
</body>
</html>
